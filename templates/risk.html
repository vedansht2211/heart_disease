<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Heart Disease Analyzer</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/dashboard">Dashboard</a>
                <a class="nav-link" href="/dataset">Dataset</a>
                <a class="nav-link active" href="/risk">Risk Analysis</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h1>Heart Disease Risk Analysis</h1>
        <p>Enter your health information to assess your risk level based on dataset averages.</p>
        <form method="post">
            <div class="mb-3">
                <label for="age" class="form-label">Age Category</label>
                <select class="form-control" id="age" name="age" required>
                    <option value="18-24">18-24</option>
                    <option value="25-29">25-29</option>
                    <option value="30-34">30-34</option>
                    <option value="35-39">35-39</option>
                    <option value="40-44">40-44</option>
                    <option value="45-49">45-49</option>
                    <option value="50-54">50-54</option>
                    <option value="55-59">55-59</option>
                    <option value="60-64">60-64</option>
                    <option value="65-69">65-69</option>
                    <option value="70-74">70-74</option>
                    <option value="75-79">75-79</option>
                    <option value="80 or older">80 or older</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="bmi" class="form-label">BMI</label>
                <input type="number" step="0.01" class="form-control" id="bmi" name="bmi" required>
            </div>
            <div class="mb-3">
                <label for="smoking" class="form-label">Smoking</label>
                <select class="form-control" id="smoking" name="smoking" required>
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Calculate Risk</button>
        </form>
        {% if risk_level %}
        <div class="mt-4 alert alert-info">
            <h4>Your Risk Level: {{ risk_level }}</h4>
        </div>
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
